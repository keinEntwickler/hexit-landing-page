features:
  - title: "Rondas cortas"
    description: "Rondas cortas. Un color, dos opciones. Decides rápido, ves el resultado al instante. Los errores cuentan — así es como mejoras."
    icon: "bolt"
  - title: "Seis modos de juego"
    description: "Seis formas de poner a prueba tu ojo: Core, Invertido, Hexagonal, Blitz, Práctica, Deslizador RGB. Cada modo entrena una habilidad distinta."
    icon: "th"
  - title: "Progreso real"
    description: "Mira lo que realmente mejora: precisión, tiempo de reacción, rachas. Tu sentido del color, con el tiempo."
    icon: "chart-line"
  - title: "Game Center"
    description: "Compite cada semana. Escala clasificaciones. Desbloquea logros sobre la marcha."
    icon: "trophy"
  - title: "Privacidad por defecto"
    description: "Sin anuncios. Sin rastreo. Sin cuenta. Tus datos se quedan en tu dispositivo."
    icon: "shield-alt"
  - title: "Sincronización iCloud"
    description: "Tu progreso, en todas partes. Sincronización privada y automática con iCloud. Sin configuración."
    icon: "cloud"

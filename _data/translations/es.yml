tagline: "Entrena tu ojo para el color en pocos minutos al día."
description: "Ves un color, eliges el código hexadecimal correcto y mejoras partida a partida."
keywords: "color,juego,adivinar,hexadecimal,rgb,puzzle,racha,quiz,cerebro,desafío,diseño"

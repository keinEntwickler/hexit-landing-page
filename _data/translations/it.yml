lang: it
lang_name: Italiano
tagline: "Allena il tuo occhio ai colori in pochi minuti al giorno."
description: "Vedi un colore, scegli il codice esadecimale giusto e migliori partita dopo partita."
keywords: "colore,gioco,indovina,esadecimale,rgb,puzzle,serie,quiz,cervello,sfida,design"
app_store_button: "Scarica dall'App Store"
features:
  - title: "Partite rapide"
    description: "Partite brevi. Un colore, due scelte. Decidi in fretta, vedi subito il risultato. Gli errori fanno parte del gioco — è così che si migliora."
    icon: "bolt"
  - title: "Sei modalità"
    description: "Sei modi per sfidare il tuo occhio: Core, Invertita, Esagonale, Blitz, Pratica, Cursore RGB. Ogni modalità allena un'abilità diversa."
    icon: "th"
  - title: "Progresso reale"
    description: "Guarda cosa migliora davvero: precisione, tempo di reazione, serie. Il tuo senso del colore, nel tempo."
    icon: "chart-line"
  - title: "Game Center"
    description: "Sfida ogni settimana. Scala le classifiche. Sblocca obiettivi giocando."
    icon: "trophy"
  - title: "Privacy al primo posto"
    description: "Niente pubblicità. Niente tracciamento. Nessun account. I tuoi dati restano sul tuo dispositivo."
    icon: "shield-alt"
  - title: "Sincronizzazione iCloud"
    description: "I tuoi progressi, ovunque. Sincronizzazione privata e automatica via iCloud. Nessuna configurazione."
    icon: "cloud"
